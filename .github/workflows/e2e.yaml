name: "e2e"

on:
    push:
        branches:
            - "1.*.x"
            - "master"
            - "main"
        paths-ignore:
            - "**/*.md"
    pull_request:
        paths-ignore:
            - "**/*.md"
    workflow_dispatch: ~

# a real browser hits the app over HTTP, so run it in dev (the test env uses mock-file sessions that
# do not survive a real browser session)
env:
    APP_ENV: "dev"
    APP_DEBUG: "0"
    DATABASE_URL: "mysql://root:root@127.0.0.1/sylius_e2e?serverVersion=8.0"
    PHP_EXTENSIONS: "intl, mbstring"
    PLAYWRIGHT_BASE_URL: "http://127.0.0.1:8080"

jobs:
    e2e:
        name: "Playwright e2e"
        runs-on: "ubuntu-latest"

        steps:
            -   name: "Start MySQL"
                run: "sudo /etc/init.d/mysql start"

            -   name: "Checkout"
                uses: "actions/checkout@v5"

            -   name: "Setup PHP"
                uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "8.3"
                    extensions: "${{ env.PHP_EXTENSIONS }}"
                    coverage: "none"
                    tools: "symfony, flex"

            -   name: "Install composer dependencies"
                uses: "ramsey/composer-install@v3"
                with:
                    dependency-versions: "highest"

            -   name: "Setup Node"
                uses: "actions/setup-node@v4"
                with:
                    node-version: "20"

            -   name: "Build admin assets"
                run: |
                    npm install -g yarn
                    (cd tests/Application && yarn install --frozen-lockfile && yarn build)
                    (cd tests/Application && bin/console assets:install public)

            -   name: "Create database and schema"
                run: |
                    (cd tests/Application && bin/console doctrine:database:create)
                    (cd tests/Application && bin/console doctrine:schema:create)

            -   name: "Load fixtures and score the catalog"
                run: |
                    (cd tests/Application && bin/console sylius:fixtures:load default --no-interaction)
                    (cd tests/Application && bin/console sylius:fixtures:load setono_sylius_completeness --no-interaction)
                    (cd tests/Application && bin/console setono:completeness:recalculate --all)

            -   name: "Install Playwright"
                run: |
                    (cd tests/e2e && npm ci && npx playwright install --with-deps chromium)

            -   name: "Start the application"
                run: |
                    (cd tests/Application && symfony server:start --port=8080 --no-tls --daemon)
                    for i in $(seq 1 30); do
                        curl -sf "$PLAYWRIGHT_BASE_URL/admin/login" > /dev/null && break
                        echo "waiting for the server ($i)..."; sleep 2
                    done

            -   name: "Run Playwright"
                run: "(cd tests/e2e && npx playwright test)"

            -   name: "Upload Playwright report"
                if: "failure()"
                uses: "actions/upload-artifact@v4"
                with:
                    name: "playwright-report"
                    path: "tests/e2e/playwright-report"
                    retention-days: 7
