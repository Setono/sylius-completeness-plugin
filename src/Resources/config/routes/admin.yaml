# the completeness section (rules, context settings, dashboard, preview, recalculate-all) all live
# under a single /completeness prefix - added here in one place rather than per route
setono_sylius_completeness_admin_completeness:
    resource: "@SetonoSyliusCompletenessPlugin/Resources/config/routes/admin/completeness.yaml"
    prefix: /completeness

# these two are actions on the product grid/page, so they belong under /products, not /completeness
setono_sylius_completeness_admin_product_bulk_recalculate:
    path: /products/completeness/bulk-recalculate
    methods: [POST]
    defaults:
        _controller: Setono\SyliusCompletenessPlugin\Controller\Admin\BulkRecalculateAction

setono_sylius_completeness_admin_product_recalculate:
    path: /products/{id}/completeness/recalculate
    methods: [POST]
    requirements:
        id: \d+
    defaults:
        _controller: Setono\SyliusCompletenessPlugin\Controller\Admin\RecalculateProductAction
