# An optional starter ruleset. Load it with:
#
#     bin/console sylius:fixtures:load setono_sylius_completeness
#
# and then rebuild the scores with:
#
#     bin/console setono:completeness:recalculate --all
sylius_fixtures:
    suites:
        setono_sylius_completeness:
            fixtures:
                setono_sylius_completeness_rule:
                    options:
                        custom:
                            - { label: 'Has a name', type: has_name, group: Content, weight_tier: critical, position: 10 }
                            - { label: 'Has a description', type: has_description, group: Content, weight_tier: high, position: 20 }
                            - { label: 'Description has at least 100 words', type: expression, configuration: { expression: 'min(word_count(product.getDescription()) / 100, 1)' }, group: Content, weight_tier: medium, position: 30 }
                            - { label: 'Has a short description', type: has_short_description, group: Content, weight_tier: medium, position: 40 }
                            - { label: 'Has an image', type: has_image, group: Media, weight_tier: critical, position: 50 }
                            - { label: 'Has at least 3 images', type: has_minimum_images, configuration: { count: 3 }, group: Media, weight_tier: medium, position: 60 }
                            - { label: 'Has a main taxon', type: has_main_taxon, group: Merchandising, weight_tier: high, position: 70 }
                            - { label: 'Is priced in the channel', type: has_price, group: Merchandising, weight_tier: critical, position: 80 }
                            - { label: 'Has a meta description', type: has_meta_description, group: SEO, weight_tier: medium, position: 90 }
                            - { label: 'Has meta keywords', type: has_meta_keywords, group: SEO, weight_tier: low, position: 100 }
